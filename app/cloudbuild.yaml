# Overview: Cloud Build build pipeline with Cloud Deploy release using git tag.

substitutions:
  _APP_NAME: hello
  _PIPELINE_NAME: deploy-demo-pipeline
  _LOCATION: europe-west1
  _REPO_NAME: google-cloud-slsa
  _TAG_NAME: latest
  _VULN_ATTESTOR_ID: vulnz-attestor
  _GCB_ATTESTOR_ID: built-by-cloud-build
  _SBOM_ATTESTOR_ID: sbom-attestor
  _KMS_KEY_NAME: binauthz-signer

steps:

  # Python test
  - id: test
    name: python:3.13-alpine
    entrypoint: /bin/sh
    dir: app
    args:
    - -c
    - |
      pip install --no-cache-dir uv
      uv run --frozen pytest -v --tb=short

  # Build image
  - id: build
    name: gcr.io/cloud-builders/docker@sha256:1fe0557459fea8552d5ce57bb77aaf238139bd69131d670e152e68358f6cb13c
    entrypoint: /bin/bash
    waitFor:
    - test
    dir: app
    args:
    - -c
    - |
      docker build --pull --build-arg VERSION=${_TAG_NAME} \
        -t "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_APP_NAME}:${_TAG_NAME}" \
        .

  # Publish image, get digest, and save it to file.
  # Digest because tags aren't (really) cryptographically verifiable.
  # gcr.io/cloud-builders/docker:20.10.24
  - id: publish
    name: gcr.io/cloud-builders/docker@sha256:56bdaa06db7f365246db658f9b769b260e52c844566f493aa02019fc04a9ce9e
    entrypoint: /bin/bash
    waitFor:
    - build
    dir: app
    args:
    - -c
    - |-
      docker push "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_APP_NAME}:${_TAG_NAME}"
      docker image inspect "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_APP_NAME}:${_TAG_NAME}" \
        --format '{{index .RepoDigests 0}}' > image-digest.txt
      cat image-digest.txt

  # Vulnerability Scan
  - id: scan
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:564.0.0-slim
    entrypoint: /bin/bash
    waitFor:
    - publish
    dir: app
    args:
    - -c
    - |
      apt-get update && apt-get install -y google-cloud-cli-local-extract
      gcloud artifacts docker images scan "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_APP_NAME}:${_TAG_NAME}" \
        --format='value(response.scan)' > /workspace/scan_id.txt

  # Attest image with BinAuthz (Vulnerability Attestation)
  - id: attest-vulnz
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:564.0.0-slim
    entrypoint: /bin/bash
    waitFor:
    - scan
    dir: app
    args:
    - -c
    - |
      # Print all found vulnerabilities for debugging/allowlisting
      echo "=== Vulnerability Scan Report ==="
      gcloud artifacts docker images list-vulnerabilities $(cat /workspace/scan_id.txt) \
        --format="table(vulnerability.effectiveSeverity, vulnerability.shortDescription, vulnerability.packageIssue[0].affectedPackage)" || true
      echo "================================="

      # Check scan results for CRITICAL vulnerabilities
      VULNZ=$(gcloud artifacts docker images list-vulnerabilities $(cat /workspace/scan_id.txt) \
        --format="value(vulnerability.name, vulnerability.effectiveSeverity)" \
        | grep -E "CRITICAL" \
        | wc -l)

      if [ "$${VULNZ}" -gt 0 ]; then
        echo "Scan failed: $${VULNZ} CRITICAL vulnerabilities found."
        exit 1
      fi

      # Sign and create BinAuthz attestation
      gcloud beta container binauthz attestations sign-and-create \
        --artifact-url="$(cat image-digest.txt)" \
        --attestor="projects/${PROJECT_ID}/attestors/${_VULN_ATTESTOR_ID}" \
        --keyversion="${_KMS_KEY_NAME}"

  # Attest image – Built by Cloud Build
  - id: attest-gcb
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:564.0.0-slim
    entrypoint: /bin/bash
    waitFor:
    - attest-vulnz
    dir: app
    args:
    - -c
    - |
      gcloud beta container binauthz attestations sign-and-create \
        --artifact-url="$(cat image-digest.txt)" \
        --attestor="projects/${PROJECT_ID}/attestors/${_GCB_ATTESTOR_ID}" \
        --keyversion="${_KMS_KEY_NAME}"

  # Generate SBOM and attest
  - id: attest-sbom
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:564.0.0-slim
    entrypoint: /bin/bash
    waitFor:
    - attest-vulnz
    dir: app
    args:
    - -c
    - |
      # Generate SBOM using gcloud artifacts sbom export (On-Demand Scanning)
      gcloud artifacts sbom export \
        --uri="$(cat image-digest.txt)" \
        --destination="/workspace/sbom.json" \
        --project=${PROJECT_ID} || true

      # Sign and create SBOM attestation
      gcloud beta container binauthz attestations sign-and-create \
        --artifact-url="$(cat image-digest.txt)" \
        --attestor="projects/${PROJECT_ID}/attestors/${_SBOM_ATTESTOR_ID}" \
        --keyversion="${_KMS_KEY_NAME}"

  # Create release in Google Cloud Deploy
  - id: release
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:564.0.0-slim
    entrypoint: /bin/bash
    waitFor:
    - attest-gcb
    - attest-sbom
    args:
    - -c
    - |
      CLEAN_TAG=$$(echo ${_TAG_NAME} | sed 's/\./-/g')
      SUFFIX="${SHORT_SHA}"
      if [ -z "$${SUFFIX}" ]; then
        SUFFIX=$$(echo ${BUILD_ID} | cut -c1-8)
      fi
      gcloud deploy releases create rel-$${CLEAN_TAG}-$${SUFFIX} \
      --delivery-pipeline ${_PIPELINE_NAME} \
      --region ${_LOCATION} \
      --annotations "commitId=${REVISION_ID},tag=${_TAG_NAME}" \
      --images "${_APP_NAME}=$(cat app/image-digest.txt)"

images:
- ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_APP_NAME:${_TAG_NAME}

options:
  # Verify generation of attestations and provenance metadata for this build.
  # Otherwise, GCB generates provenance for global builds only.
  requestedVerifyOption: VERIFIED
  sourceProvenanceHash: ["SHA256"]
  logging: CLOUD_LOGGING_ONLY

tags:
- demo
